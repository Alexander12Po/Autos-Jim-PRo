{% extends "base.html" %}
{% block title %}Admin Login - AutoMarket Premium{% endblock %}
{% block content %}

<div class="auth-container">
  <div class="auth-card">
    <i class="fa-solid fa-user-shield auth-icon"></i>
    <h2>Panel de Administrador</h2>
    <p>Ingresa tus credenciales para continuar</p>
    <form method="POST">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" name="username" required autofocus>
      </div>
      <div class="form-group">
        <label>Contrasena</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Iniciar sesion</button>
    </form>
    <p class="auth-hint">Credenciales de prueba: <strong>admin</strong> / <strong>admin123</strong></p>
  </div>
</div>

{% endblock %}
